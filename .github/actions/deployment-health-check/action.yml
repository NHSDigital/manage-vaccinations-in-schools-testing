name: Deployment health check
description: Checks if a deployment is reachable by making a request to the /up endpoint
inputs:
  environment_url:
    description: The URL of the environment to check
    required: true

runs:
  using: composite
  steps:
    - name: Deployment health check
      shell: bash
      run: |
        status_code=$(
          curl -s -o /dev/null \
            --max-time 10 \
            --connect-timeout 5 \
            -w "%{http_code}" \
            "${{ inputs.environment_url }}/up" 2>&1
        )
        curl_exit_code=$?
        if [ $curl_exit_code -eq 0 ] \
          && [ "$status_code" -ge 200 ] \
          && [ "$status_code" -lt 300 ]; then
          echo "MAVIS deployment is reachable (status code $status_code)"
          exit 0
        elif [ $curl_exit_code -ne 0 ]; then
          echo "Curl error (exit code $curl_exit_code) on attempt $i"
        else
          echo "HTTP error (status code $status_code) on attempt $i"
        fi
        echo "MAVIS deployment is unreachable at ${{ inputs.environment_url }}"
        echo "(Perhaps the deployment job did not run?)"
        exit 1
