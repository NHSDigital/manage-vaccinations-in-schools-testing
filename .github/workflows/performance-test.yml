name: Performance testing

on:
  push:
    branches:
      - "performance-testing"

  workflow_dispatch:
    inputs:
      session_slug:
        description: "Session slug - for a session in the QA environment. This session MUST HAVE A SESSION DATE FOR TODAY."
        required: true
        type: string
      duration:
        description: "Duration of test, in seconds. This will include ramp-up."
        required: false
        type: number
      threads:
        description: "Threads to run. Equivalent to the number of nurses using the system."
        required: false
        type: number
      ramp_up:
        description: "Ramp-up time in seconds. Threads will be gradually started up over this time."
        required: false
        type: number
      vaccination_loop:
        description: "Vaccination loop. The number of vaccinations each nurse will perform before logging and back in again."
        required: false
        type: number

jobs:
  nurse_journey_performance_test:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run JMeter test
        uses: QAInsights/PerfAction@v5.6.2
        with:
          test-plan-path: performance-tests/nurse-journey.jmx
          results-file: nurse-journey-results.jtl
          args: "-e -o ./nurse-journey-report/html/ -JSessionSlug=${{inputs.session_slug}} -JAuthToken=${{secrets.HTTP_AUTH_TOKEN_FOR_TESTS}} -JDuration=${{inputs.duration}} -JThreads=${{inputs.threads}} -JRampUp=${{inputs.ramp_up}} -JVaccinationLoop=${{inputs.vaccination_loop}}"

      - name: Upload JMeter test results
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-nurse-journey-results
          path: nurse-journey-results.jtl
          if-no-files-found: error

      - name: Upload JMeter HTML test report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-reports
          path: nurse-journey-report
          if-no-files-found: error
