name: Run full OWASP ZAP scan against QA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan Mavis on QA with the OWASP ZAP full scan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ZAP Scan
        uses: zaproxy/action-full-scan@bee4e5be916301228d2b1b2dcad73aab6fa6a25b # v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://qa.mavistesting.com/
        env:
          ZAP_AUTH_HEADER_VALUE: Basic ${{ secrets.HTTP_AUTH_TOKEN_FOR_TESTS }}
