name: Performance tests

on:
  push:
    branches:
      - "performance-testing"

  workflow_dispatch:
    inputs:
      session_slug:
        description: "Session slug - for a session in the QA environment. This session MUST HAVE A SESSION DATE FOR TODAY."
        required: true
        type: string
      duration:
        description: "Duration of test, in seconds. This will include ramp-up."
        required: false
        type: number
      threads:
        description: "Threads to run. Equivalent to the number of nurses using the system."
        required: false
        type: number
      ramp_up:
        description: "Ramp-up time in seconds. Threads will be gradually started up over this time."
        required: false
        type: number
      vaccination_loop:
        description: "Vaccination loop. The number of vaccinations each nurse will perform before logging and back in again."
        required: false
        type: number

# env:
#   JMETER_PLUGIN_INSTALL_LIST: "jpgc-udp,jpgc-graphs-basic,jpgc-dummy,bzm-random-csv"

jobs:
  nurse_journey_performance_test:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      # - name: Install JMeter
      #   run: |
      #     sudo apt-get update
      #     sudo apt

      # - name: Install JMeter plugins
      #   run: |
      #     wget -O ~/jmeter-plugins-manager.jar https://jmeter-plugins.org/get/
      #     java -jar ~/jmeter-plugins-manager.jar install jpgc-udp,jpgc-graphs-basic,jpgc-dummy,bzm-random-csv

      - name: Run JMeter test
        uses: rbhadti94/apache-jmeter-action@v0.7.0
        with:
          jmeter-plugins: "jpgc-udp,jpgc-graphs-basic,jpgc-dummy,bzm-random-csv"
          testFilePath: performance-tests/nurse-journey.jmx
          outputReportsFolder: nurse-journey-reports/
          plugins: jpgc-udp,jpgc-graphs-basic,jpgc-dummy,bzm-random-csv
          # args: "-e -o ./nurse-journey-report -JSessionSlug=${{inputs.session_slug}} -JAuthToken=${{secrets.HTTP_AUTH_TOKEN_FOR_TESTS}} -JDuration=${{inputs.duration}} -JThreads=${{inputs.threads}} -JRampUp=${{inputs.ramp_up}} -JVaccinationLoop=${{inputs.vaccination_loop}}"

      - name: Upload JMeter test results
        uses: actions/upload-artifact@v4
        with:
          name: Upload JMeter nurse journey results
          path: nurse-journey-reports
          if-no-files-found: error

