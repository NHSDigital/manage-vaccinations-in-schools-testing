modules:
  local:
    sequential: true
  jmeter:
    version: 5.6.3
    plugins:
      - jpgc-udp
      - jpgc-graphs-basic
      - jpgc-dummy
      - bzm-random-csv
    plugins_manager:
      version: 1.7.0
    command-runner:
      version: 2.3
    properties:
      AuthToken: "bWFuYWdlOnZhY2NpbmF0aW9ucw=="
      URN: 100007
      InputFile: "cohortnew.csv"
      Threads: 1

execution:
- scenario: create-new-cohort
- scenario: run-file-import
- scenario: run-consent-journey
- scenario: run-nurse-journey

scenarios:
  create-new-cohort:
    script: generate-cohort.jmx
    properties:
      RowCount: 100
  run-file-import:
    script: upload-cohort-data.jmx
  run-consent-journey:
    script: consent-journey.jmx
    properties:
      Duration: 3600
      Threads: 20
      RampUp: 10
      Loops: 1000
  run-nurse-journey:
    script: nurse-journey.jmx
    properties:
      Duration: 600
      Threads: 70
      RampUp: 600
      VaccinationLoop: 20
